model:
  base_learning_rate: 4.5e-06
  target: ldm.models.autoencoder.VAE
  params:
    monitor: val/rec_loss
    embed_dim: 16
    lossconfig:
      target: ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 50001
        kl_weight: 1.0e-06
        disc_weight: 0.5
    ddconfig:
      z_channels: 16
      resolution: 64
      in_channels: 3
      out_ch: 3
      ch: 64
      ch_mult: [1,2,4]
      num_res_blocks: 2
      attn_resolutions: [8]
      dropout: 0.0
data:
  target: main.StreetSatDataModule
  params:
    batch_size: 6
    train:
      target: data.datasets.StreetSatTrain
      params:
        size: 64
    val:
      target: data.datasets.StreetSatVal
      params:
        size: 64
